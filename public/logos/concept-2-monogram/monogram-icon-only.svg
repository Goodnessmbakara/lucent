<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon Only - Perfect Square for App Icons -->

  <!-- Background Circle (optional, comment out for transparent) -->
  <!-- <circle cx="100" cy="100" r="95" fill="#0A0E27"/> -->

  <!-- L and C Interlocking Mark (Centered and Scaled) -->
  <g id="monogram-mark" transform="translate(40, 40)">
    <!-- Outer Square Border -->
    <rect x="0" y="0" width="120" height="120" rx="12" stroke="#0A0E27" stroke-width="5" fill="none"/>

    <!-- L Shape -->
    <path d="M 20 20 L 20 100 L 70 100" stroke="#0A0E27" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- C Shape -->
    <path d="M 100 35 A 30 30 0 0 1 100 85" stroke="#0A0E27" stroke-width="12" stroke-linecap="round" fill="none"/>
    <path d="M 100 35 L 78 35" stroke="#0A0E27" stroke-width="12" stroke-linecap="round" fill="none"/>
    <path d="M 100 85 L 78 85" stroke="#0A0E27" stroke-width="12" stroke-linecap="round" fill="none"/>

    <!-- Center Hexagon (Gold Accent) -->
    <g id="center-hexagon" transform="translate(60, 60)">
      <!-- Glow layers -->
      <polygon points="0,-12 10,-6 10,6 0,12 -10,6 -10,-6" fill="#FFB84D" opacity="0.2" transform="scale(1.8)"/>
      <polygon points="0,-12 10,-6 10,6 0,12 -10,6 -10,-6" fill="#FFB84D" opacity="0.4" transform="scale(1.4)"/>
      <polygon points="0,-12 10,-6 10,6 0,12 -10,6 -10,-6" fill="#FFB84D"/>
    </g>
  </g>
</svg>
