<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Full Monogram Logo - Light Background -->

  <!-- L and C Interlocking Mark -->
  <g id="monogram-mark">
    <!-- Outer Square Border -->
    <rect x="20" y="20" width="80" height="80" rx="8" stroke="#0A0E27" stroke-width="3" fill="none"/>

    <!-- L Shape (left vertical and bottom horizontal) -->
    <path d="M 35 35 L 35 85 L 65 85" stroke="#0A0E27" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- C Shape (right curved) -->
    <path d="M 85 45 A 20 20 0 0 1 85 75" stroke="#0A0E27" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M 85 45 L 70 45" stroke="#0A0E27" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M 85 75 L 70 75" stroke="#0A0E27" stroke-width="8" stroke-linecap="round" fill="none"/>

    <!-- Center Hexagon (Gold Accent) -->
    <g id="center-hexagon">
      <polygon points="60,52 66,56 66,64 60,68 54,64 54,56" fill="#FFB84D"/>
      <!-- Glow effect -->
      <polygon points="60,52 66,56 66,64 60,68 54,64 54,56" fill="#FFB84D" opacity="0.3" transform="scale(1.2) translate(-2, -2)"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g id="wordmark">
    <text x="130" y="70" font-family="Inter, sans-serif" font-size="36" font-weight="600" fill="#0A0E27" letter-spacing="0">
      Lucent
    </text>
    <text x="130" y="92" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#666666" letter-spacing="0.5">
      See clearly before you sign
    </text>
  </g>
</svg>
