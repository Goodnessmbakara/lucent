<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Lucent Minimal Icon - Light Background -->
  <!-- Clean, no border, just letterforms -->

  <g id="monogram-minimal" transform="translate(50, 50)">
    <!-- L Shape (thicker, more prominent) -->
    <path d="M 10 10 L 10 90 L 60 90"
          stroke="#0A0E27"
          stroke-width="18"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>

    <!-- C Shape (curves around) -->
    <path d="M 90 30 Q 90 10 70 10 Q 50 10 50 30 L 50 70 Q 50 90 70 90 Q 90 90 90 70"
          stroke="#0A0E27"
          stroke-width="18"
          stroke-linecap="round"
          fill="none"/>

    <!-- Center Dot (gold accent) -->
    <circle cx="50" cy="50" r="8" fill="#FFB84D"/>
    <circle cx="50" cy="50" r="12" fill="#FFB84D" opacity="0.3"/>
    <circle cx="50" cy="50" r="16" fill="#FFB84D" opacity="0.15"/>
  </g>
</svg>
