<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Lucent Minimal Icon - Dark Background -->
  <rect width="200" height="200" fill="#0A0E27"/>

  <g id="monogram-minimal" transform="translate(50, 50)">
    <!-- L Shape -->
    <path d="M 10 10 L 10 90 L 60 90"
          stroke="#FFFFFF"
          stroke-width="18"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>

    <!-- C Shape -->
    <path d="M 90 30 Q 90 10 70 10 Q 50 10 50 30 L 50 70 Q 50 90 70 90 Q 90 90 90 70"
          stroke="#FFFFFF"
          stroke-width="18"
          stroke-linecap="round"
          fill="none"/>

    <!-- Center Dot with enhanced glow -->
    <defs>
      <filter id="glow-dark">
        <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>

    <circle cx="50" cy="50" r="20" fill="#FFB84D" opacity="0.2"/>
    <circle cx="50" cy="50" r="14" fill="#FFB84D" opacity="0.4"/>
    <circle cx="50" cy="50" r="8" fill="#FFB84D" filter="url(#glow-dark)"/>
  </g>
</svg>
