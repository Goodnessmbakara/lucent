<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Lucent Icon - Gold Accent Version -->

  <g id="monogram-minimal" transform="translate(50, 50)">
    <!-- L Shape in Navy -->
    <path d="M 10 10 L 10 90 L 60 90"
          stroke="#0A0E27"
          stroke-width="18"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>

    <!-- C Shape in Gold -->
    <path d="M 90 30 Q 90 10 70 10 Q 50 10 50 30 L 50 70 Q 50 90 70 90 Q 90 90 90 70"
          stroke="#FFB84D"
          stroke-width="18"
          stroke-linecap="round"
          fill="none"/>

    <!-- Center Dot -->
    <circle cx="50" cy="50" r="10" fill="#FFB84D"/>
    <circle cx="50" cy="50" r="14" fill="#FFB84D" opacity="0.4"/>
  </g>
</svg>
