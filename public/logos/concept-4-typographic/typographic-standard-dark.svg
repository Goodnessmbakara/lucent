<svg width="500" height="150" viewBox="0 0 500 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Typographic Illumination - Dark Background -->
  <rect width="500" height="150" fill="#0A0E27"/>

  <!-- Tagline with dot -->
  <g id="tagline">
    <text x="50" y="30" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="rgba(255,255,255,0.6)" letter-spacing="1">
      SEE CLEARLY BEFORE YOU SIGN
    </text>
    <circle cx="440" cy="26" r="3" fill="#4A9EFF"/>
    <circle cx="440" cy="26" r="6" fill="#4A9EFF" opacity="0.3"/>
  </g>

  <!-- Main Wordmark -->
  <g id="wordmark" transform="translate(50, 60)">
    <!-- L -->
    <text x="0" y="50" font-family="Inter, sans-serif" font-size="56" font-weight="700" fill="#FFFFFF" letter-spacing="-1">
      L
    </text>

    <!-- U with opening -->
    <g id="u-with-glow" transform="translate(60, 0)">
      <!-- Left vertical stroke of U -->
      <rect x="0" y="10" width="8" height="40" fill="#FFFFFF" rx="4"/>

      <!-- Bottom curve of U -->
      <path d="M 4 50 Q 4 58 12 58 L 38 58 Q 46 58 46 50"
            stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" fill="none"/>

      <defs>
        <linearGradient id="gold-glow-dark" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#FFB84D;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#F5A82B;stop-opacity:1" />
        </linearGradient>
        <filter id="glow-filter-dark">
          <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- Glowing arc - more prominent on dark background -->
      <path d="M 50 10 Q 58 10 58 18 L 58 50"
            stroke="url(#gold-glow-dark)" stroke-width="7" stroke-linecap="round" fill="none" filter="url(#glow-filter-dark)"/>

      <!-- Enhanced glow beam -->
      <line x1="50" y1="10" x2="58" y2="10"
            stroke="#FFB84D" stroke-width="3" opacity="0.5"/>
    </g>

    <!-- C -->
    <text x="130" y="50" font-family="Inter, sans-serif" font-size="56" font-weight="700" fill="#FFFFFF" letter-spacing="-1">
      C
    </text>

    <!-- E -->
    <text x="190" y="50" font-family="Inter, sans-serif" font-size="56" font-weight="700" fill="#FFFFFF" letter-spacing="-1">
      E
    </text>

    <!-- N -->
    <text x="245" y="50" font-family="Inter, sans-serif" font-size="56" font-weight="700" fill="#FFFFFF" letter-spacing="-1">
      N
    </text>

    <!-- T -->
    <text x="310" y="50" font-family="Inter, sans-serif" font-size="56" font-weight="700" fill="#FFFFFF" letter-spacing="-1">
      T
    </text>
  </g>
</svg>
