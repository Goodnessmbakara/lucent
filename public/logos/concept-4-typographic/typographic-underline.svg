<svg width="500" height="120" viewBox="0 0 500 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Typographic Illumination - Underline Variant -->

  <defs>
    <linearGradient id="underline-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFB84D;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#FFB84D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB84D;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Main Wordmark -->
  <g id="wordmark" transform="translate(80, 40)">
    <text x="0" y="40" font-family="Inter, sans-serif" font-size="52" font-weight="700" fill="#0A0E27" letter-spacing="-1">
      LUCENT
    </text>

    <!-- Gold arc underline under U -->
    <g id="u-underline" transform="translate(57, 48)">
      <!-- Glowing underline arc -->
      <path d="M -10 0 Q 18 8 46 0"
            stroke="url(#underline-gradient)" stroke-width="4" stroke-linecap="round" fill="none"/>

      <!-- Glow effect -->
      <ellipse cx="18" cy="4" rx="28" ry="6" fill="#FFB84D" opacity="0.15"/>
    </g>
  </g>

  <!-- Tagline -->
  <text x="80" y="105" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#666666" letter-spacing="1">
    See clearly before you sign
  </text>
</svg>
