<svg width="380" height="100" viewBox="0 0 380 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Typographic Illumination - Compact Version -->

  <defs>
    <linearGradient id="gold-gradient-compact" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB84D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5A82B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow-compact">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="wordmark-compact" transform="translate(40, 30)">
    <!-- LUCENT text with minimal spacing -->
    <text x="0" y="40" font-family="Inter, sans-serif" font-size="48" font-weight="700" fill="#0A0E27" letter-spacing="-2">
      L
    </text>

    <!-- U with glow (compact) -->
    <g transform="translate(45, 0)">
      <rect x="0" y="5" width="6" height="30" fill="#0A0E27" rx="3"/>
      <path d="M 3 35 Q 3 41 8 41 L 28 41 Q 33 41 33 35"
            stroke="#0A0E27" stroke-width="6" stroke-linecap="round" fill="none"/>
      <path d="M 37 5 Q 42 5 42 10 L 42 35"
            stroke="url(#gold-gradient-compact)" stroke-width="5" stroke-linecap="round" fill="none" filter="url(#glow-compact)"/>
    </g>

    <text x="90" y="40" font-family="Inter, sans-serif" font-size="48" font-weight="700" fill="#0A0E27" letter-spacing="-2">
      CENT
    </text>
  </g>

  <!-- Tagline (optional) -->
  <text x="40" y="85" font-family="Inter, sans-serif" font-size="9" font-weight="400" fill="#666666" letter-spacing="0.5">
    Transaction preview for Stacks
  </text>
</svg>
