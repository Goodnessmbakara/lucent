<svg width="500" height="120" viewBox="0 0 500 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Typographic Illumination - With Accent Dot -->

  <defs>
    <filter id="dot-glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Blue accent dot -->
  <g id="accent-dot" transform="translate(40, 50)">
    <circle cx="0" cy="0" r="8" fill="#4A9EFF" opacity="0.2"/>
    <circle cx="0" cy="0" r="5" fill="#4A9EFF" filter="url(#dot-glow)"/>
  </g>

  <!-- Main Wordmark -->
  <g id="wordmark" transform="translate(80, 40)">
    <text x="0" y="40" font-family="Inter, sans-serif" font-size="52" font-weight="700" fill="#0A0E27" letter-spacing="-1">
      L
    </text>

    <!-- U with opened right side -->
    <g id="u-glow" transform="translate(57, 0)">
      <text x="0" y="40" font-family="Inter, sans-serif" font-size="52" font-weight="700" fill="#0A0E27" letter-spacing="-1">
        U
      </text>

      <!-- Gold glow effect on right edge -->
      <defs>
        <linearGradient id="edge-glow" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#FFB84D;stop-opacity:0" />
          <stop offset="100%" style="stop-color:#FFB84D;stop-opacity:0.8" />
        </linearGradient>
      </defs>

      <rect x="35" y="10" width="8" height="30" fill="url(#edge-glow)" rx="2"/>
    </g>

    <text x="110" y="40" font-family="Inter, sans-serif" font-size="52" font-weight="700" fill="#0A0E27" letter-spacing="-1">
      CENT
    </text>
  </g>

  <!-- Tagline -->
  <text x="80" y="100" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#666666" letter-spacing="1">
    See clearly before you sign
  </text>
</svg>
