<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Business Card Mockup -->

  <!-- Background -->
  <rect width="1200" height="800" fill="#E8EAEF"/>

  <!-- Card Title -->
  <text x="100" y="80" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#0A0E27">
    Business Cards
  </text>

  <!-- Front of Card -->
  <g id="card-front" transform="translate(100, 150)">
    <!-- Card Shadow -->
    <rect x="5" y="5" width="500" height="300" rx="12" fill="#000" opacity="0.1"/>

    <!-- Card Background (Navy) -->
    <rect width="500" height="300" rx="12" fill="#0A0E27"/>

    <!-- Subtle pattern -->
    <pattern id="card-pattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,184,77,0.05)" stroke-width="1"/>
    </pattern>
    <rect width="500" height="300" rx="12" fill="url(#card-pattern)"/>

    <!-- Gold accent edge -->
    <rect width="500" height="4" fill="#FFB84D" opacity="0.5"/>

    <!-- Logo (Large) -->
    <g transform="translate(40, 40)">
      <g transform="scale(0.8)">
        <path d="M 10 10 L 10 90 L 60 90"
              stroke="#FFFFFF"
              stroke-width="18"
              stroke-linecap="round"
              stroke-linejoin="round"
              fill="none"/>
        <path d="M 90 30 Q 90 10 70 10 Q 50 10 50 30 L 50 70 Q 50 90 70 90 Q 90 90 90 70"
              stroke="#FFFFFF"
              stroke-width="18"
              stroke-linecap="round"
              fill="none"/>
        <circle cx="50" cy="50" r="8" fill="#FFB84D"/>
        <circle cx="50" cy="50" r="12" fill="#FFB84D" opacity="0.3"/>
        <circle cx="50" cy="50" r="16" fill="#FFB84D" opacity="0.15"/>
      </g>
    </g>

    <!-- Company Name -->
    <text x="120" y="95" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">
      Lucent
    </text>

    <!-- Tagline -->
    <text x="40" y="180" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="rgba(255,255,255,0.6)" letter-spacing="1">
      SEE CLEARLY BEFORE YOU SIGN
    </text>

    <!-- Website -->
    <text x="40" y="250" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#FFB84D">
      getlucent.com
    </text>
  </g>

  <!-- Back of Card -->
  <g id="card-back" transform="translate(680, 150)">
    <!-- Card Shadow -->
    <rect x="5" y="5" width="500" height="300" rx="12" fill="#000" opacity="0.1"/>

    <!-- Card Background (White) -->
    <rect width="500" height="300" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2"/>

    <!-- Small Logo -->
    <g transform="translate(40, 40)">
      <g transform="scale(0.4)">
        <path d="M 10 10 L 10 90 L 60 90"
              stroke="#0A0E27"
              stroke-width="18"
              stroke-linecap="round"
              stroke-linejoin="round"
              fill="none"/>
        <path d="M 90 30 Q 90 10 70 10 Q 50 10 50 30 L 50 70 Q 50 90 70 90 Q 90 90 90 70"
              stroke="#0A0E27"
              stroke-width="18"
              stroke-linecap="round"
              fill="none"/>
        <circle cx="50" cy="50" r="8" fill="#FFB84D"/>
      </g>

      <text x="50" y="22" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#0A0E27">
        Lucent
      </text>
    </g>

    <!-- Contact Info -->
    <g transform="translate(40, 120)">
      <text font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#0A0E27">
        John Doe
      </text>
      <text y="25" font-family="Inter, sans-serif" font-size="13" fill="#666">
        Co-Founder & CEO
      </text>

      <text y="70" font-family="Inter, sans-serif" font-size="13" fill="#666">
        📧 john@getlucent.com
      </text>
      <text y="95" font-family="Inter, sans-serif" font-size="13" fill="#666">
        🐦 @getlucent
      </text>
      <text y="120" font-family="Inter, sans-serif" font-size="13" fill="#666">
        💬 discord.gg/lucent
      </text>
    </g>
  </g>

  <!-- Alternative Card Design (Vertical) -->
  <g id="card-vertical" transform="translate(100, 550)">
    <text font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#0A0E27">
      Vertical Format
    </text>

    <!-- Card -->
    <rect y="30" x="5" y="35" width="300" height="500" rx="12" fill="#000" opacity="0.1"/>
    <rect y="30" width="300" height="500" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2"/>

    <!-- Gold accent top -->
    <rect y="30" width="300" height="120" rx="12" fill="url(#cover-gradient)"/>

    <!-- Logo centered -->
    <g transform="translate(100, 80)">
      <g transform="scale(0.5)">
        <path d="M 10 10 L 10 90 L 60 90"
              stroke="#FFFFFF"
              stroke-width="18"
              stroke-linecap="round"
              stroke-linejoin="round"
              fill="none"/>
        <path d="M 90 30 Q 90 10 70 10 Q 50 10 50 30 L 50 70 Q 50 90 70 90 Q 90 90 90 70"
              stroke="#FFFFFF"
              stroke-width="18"
              stroke-linecap="round"
              fill="none"/>
        <circle cx="50" cy="50" r="8" fill="#FFB84D"/>
      </g>
    </g>

    <!-- Content -->
    <text x="150" y="180" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#0A0E27" text-anchor="middle">
      Lucent
    </text>

    <text x="150" y="220" font-family="Inter, sans-serif" font-size="12" fill="#666" text-anchor="middle">
      Transaction Preview
    </text>
    <text x="150" y="240" font-family="Inter, sans-serif" font-size="12" fill="#666" text-anchor="middle">
      for Stacks Blockchain
    </text>

    <!-- Divider -->
    <line x1="40" y1="280" x2="260" y2="280" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Info -->
    <text x="40" y="320" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#0A0E27">
      Jane Smith
    </text>
    <text x="40" y="340" font-family="Inter, sans-serif" font-size="11" fill="#666">
      Head of Product
    </text>

    <text x="40" y="380" font-family="Inter, sans-serif" font-size="11" fill="#666">
      jane@getlucent.com
    </text>
    <text x="40" y="405" font-family="Inter, sans-serif" font-size="11" fill="#FFB84D">
      getlucent.com
    </text>

    <!-- QR Code placeholder -->
    <rect x="90" y="440" width="120" height="120" rx="8" fill="#F5F6F9"/>
    <text x="150" y="505" font-family="Inter, sans-serif" font-size="12" fill="#999" text-anchor="middle">
      QR CODE
    </text>
  </g>

  <!-- Sticker Design -->
  <g id="sticker" transform="translate(480, 550)">
    <text font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#0A0E27">
      Sticker / Badge
    </text>

    <!-- Circle sticker -->
    <circle cx="150" cy="180" r="148" fill="#000" opacity="0.05"/>
    <circle cx="150" cy="180" r="145" fill="#0A0E27"/>

    <!-- Logo in center -->
    <g transform="translate(65, 95)">
      <g transform="scale(1.7)">
        <path d="M 10 10 L 10 90 L 60 90"
              stroke="#FFFFFF"
              stroke-width="18"
              stroke-linecap="round"
              stroke-linejoin="round"
              fill="none"/>
        <path d="M 90 30 Q 90 10 70 10 Q 50 10 50 30 L 50 70 Q 50 90 70 90 Q 90 90 90 70"
              stroke="#FFFFFF"
              stroke-width="18"
              stroke-linecap="round"
              fill="none"/>
        <circle cx="50" cy="50" r="8" fill="#FFB84D"/>
        <circle cx="50" cy="50" r="12" fill="#FFB84D" opacity="0.3"/>
      </g>
    </g>

    <!-- Circle border -->
    <circle cx="150" cy="180" r="145" fill="none" stroke="#FFB84D" stroke-width="3"/>

    <!-- Hexagon Sticker -->
    <g transform="translate(370, 60)">
      <polygon points="110,50 160,80 160,140 110,170 60,140 60,80"
               fill="#000" opacity="0.05" transform="translate(2,2)"/>
      <polygon points="110,50 160,80 160,140 110,170 60,140 60,80"
               fill="#FFB84D"/>

      <!-- Logo -->
      <g transform="translate(60, 70)">
        <g transform="scale(0.5)">
          <path d="M 10 10 L 10 90 L 60 90"
                stroke="#0A0E27"
                stroke-width="18"
                stroke-linecap="round"
                stroke-linejoin="round"
                fill="none"/>
          <path d="M 90 30 Q 90 10 70 10 Q 50 10 50 30 L 50 70 Q 50 90 70 90 Q 90 90 90 70"
                stroke="#0A0E27"
                stroke-width="18"
                stroke-linecap="round"
                fill="none"/>
          <circle cx="50" cy="50" r="8" fill="#0A0E27"/>
        </g>
      </g>
    </g>
  </g>
</svg>
