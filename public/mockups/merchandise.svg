<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Merchandise Mockup -->

  <!-- Background -->
  <rect width="1200" height="900" fill="#F5F6F9"/>

  <!-- T-Shirt Mockup -->
  <g id="tshirt" transform="translate(100, 100)">
    <text font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#0A0E27">
      T-Shirt Design
    </text>

    <!-- T-shirt shape (simplified) -->
    <path d="M 150 70 L 100 120 L 100 400 L 400 400 L 400 120 L 350 70 L 300 100 L 200 100 Z"
          fill="#0A0E27"
          stroke="#1A1D2E"
          stroke-width="2"/>

    <!-- Logo on chest -->
    <g transform="translate(180, 180)">
      <g transform="scale(1.4)">
        <path d="M 10 10 L 10 90 L 60 90"
              stroke="#FFFFFF"
              stroke-width="18"
              stroke-linecap="round"
              stroke-linejoin="round"
              fill="none"/>
        <path d="M 90 30 Q 90 10 70 10 Q 50 10 50 30 L 50 70 Q 50 90 70 90 Q 90 90 90 70"
              stroke="#FFFFFF"
              stroke-width="18"
              stroke-linecap="round"
              fill="none"/>
        <circle cx="50" cy="50" r="8" fill="#FFB84D"/>
        <circle cx="50" cy="50" r="12" fill="#FFB84D" opacity="0.3"/>
      </g>
    </g>

    <!-- Text below logo -->
    <text x="250" y="360" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#FFFFFF" text-anchor="middle">
      LUCENT
    </text>
    <text x="250" y="385" font-family="Inter, sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="2">
      SEE CLEARLY BEFORE YOU SIGN
    </text>
  </g>

  <!-- Mug Mockup -->
  <g id="mug" transform="translate(600, 100)">
    <text font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#0A0E27">
      Mug Design
    </text>

    <!-- Mug shape -->
    <ellipse cx="200" cy="200" rx="120" ry="30" fill="#E0E0E0"/>
    <rect x="80" y="200" width="240" height="200" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2"/>
    <ellipse cx="200" cy="400" rx="120" ry="30" fill="#D0D0D0"/>

    <!-- Handle -->
    <path d="M 320 250 Q 380 300 320 350"
          fill="none"
          stroke="#E0E0E0"
          stroke-width="20"
          stroke-linecap="round"/>

    <!-- Logo on mug -->
    <g transform="translate(140, 260)">
      <g transform="scale(0.6)">
        <path d="M 10 10 L 10 90 L 60 90"
              stroke="#0A0E27"
              stroke-width="18"
              stroke-linecap="round"
              stroke-linejoin="round"
              fill="none"/>
        <path d="M 90 30 Q 90 10 70 10 Q 50 10 50 30 L 50 70 Q 50 90 70 90 Q 90 90 90 70"
              stroke="#0A0E27"
              stroke-width="18"
              stroke-linecap="round"
              fill="none"/>
        <circle cx="50" cy="50" r="8" fill="#FFB84D"/>
      </g>

      <text x="60" y="30" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#0A0E27">
        LUCENT
      </text>
    </g>
  </g>

  <!-- Laptop Sticker -->
  <g id="laptop" transform="translate(100, 550)">
    <text font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#0A0E27">
      Laptop Sticker
    </text>

    <!-- Laptop shape (closed) -->
    <rect y="50" width="400" height="15" rx="2" fill="#C0C0C0"/>
    <rect y="65" width="400" height="250" rx="8" fill="#2A2D3E"/>
    <rect y="75" width="380" height="230" x="10" fill="#1A1D2E"/>

    <!-- Apple logo style (generic) -->
    <circle cx="200" cy="190" r="60" fill="#FFFFFF" opacity="0.05"/>

    <!-- Sticker on laptop -->
    <g transform="translate(160, 150)">
      <rect width="80" height="80" rx="12" fill="#FFB84D"/>

      <!-- Mini logo -->
      <g transform="translate(15, 15)">
        <g transform="scale(0.5)">
          <path d="M 10 10 L 10 90 L 60 90"
                stroke="#0A0E27"
                stroke-width="18"
                stroke-linecap="round"
                stroke-linejoin="round"
                fill="none"/>
          <path d="M 90 30 Q 90 10 70 10 Q 50 10 50 30 L 50 70 Q 50 90 70 90 Q 90 90 90 70"
                stroke="#0A0E27"
                stroke-width="18"
                stroke-linecap="round"
                fill="none"/>
          <circle cx="50" cy="50" r="8" fill="#0A0E27"/>
        </g>
      </g>
    </g>

    <!-- Additional stickers around -->
    <g transform="translate(90, 220)">
      <circle r="25" fill="#4A9EFF" opacity="0.8"/>
      <text y="7" font-family="monospace" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">
        STX
      </text>
    </g>

    <g transform="translate(320, 200)">
      <rect width="60" height="40" rx="8" fill="#27C93F" opacity="0.8"/>
      <text x="30" y="26" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">
        SAFE
      </text>
    </g>
  </g>

  <!-- Tote Bag -->
  <g id="tote" transform="translate(600, 550)">
    <text font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#0A0E27">
      Tote Bag
    </text>

    <!-- Bag shape -->
    <path d="M 100 100 L 80 320 L 320 320 L 300 100 Z"
          fill="#F5F6F9"
          stroke="#D0D0D0"
          stroke-width="2"/>

    <!-- Handles -->
    <path d="M 130 100 Q 150 50 170 100"
          fill="none"
          stroke="#D0D0D0"
          stroke-width="8"
          stroke-linecap="round"/>
    <path d="M 230 100 Q 250 50 270 100"
          fill="none"
          stroke="#D0D0D0"
          stroke-width="8"
          stroke-linecap="round"/>

    <!-- Logo on bag -->
    <g transform="translate(150, 180)">
      <g transform="scale(1.0)">
        <path d="M 10 10 L 10 90 L 60 90"
              stroke="#0A0E27"
              stroke-width="18"
              stroke-linecap="round"
              stroke-linejoin="round"
              fill="none"/>
        <path d="M 90 30 Q 90 10 70 10 Q 50 10 50 30 L 50 70 Q 50 90 70 90 Q 90 90 90 70"
              stroke="#0A0E27"
              stroke-width="18"
              stroke-linecap="round"
              fill="none"/>
        <circle cx="50" cy="50" r="8" fill="#FFB84D"/>
      </g>
    </g>

    <!-- Text below -->
    <text x="200" y="320" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#0A0E27" text-anchor="middle">
      getlucent.com
    </text>
  </g>
</svg>
