<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Twitter/X Card: 1200x630px -->

  <defs>
    <!-- Gradient Background -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1F3A;stop-opacity:1" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(74, 158, 255, 0.1)" stroke-width="1"/>
    </pattern>

    <!-- Logo Glow Effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gold Accent Glow -->
    <filter id="gold-glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>

  <!-- Grid Overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative Elements -->
  <circle cx="100" cy="80" r="60" fill="#FFB84D" opacity="0.05"/>
  <circle cx="1100" cy="550" r="80" fill="#4A9EFF" opacity="0.05"/>

  <!-- Gold Accent Lines -->
  <line x1="80" y1="200" x2="80" y2="430" stroke="#FFB84D" stroke-width="4" opacity="0.3" stroke-linecap="round"/>
  <line x1="80" y1="430" x2="150" y2="430" stroke="#FFB84D" stroke-width="4" opacity="0.3" stroke-linecap="round"/>

  <!-- Lucent Logo (Scaled and Centered Left) -->
  <g transform="translate(150, 165)">
    <!-- L Shape -->
    <path d="M 10 10 L 10 90 L 60 90"
          stroke="#FFFFFF"
          stroke-width="18"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"
          filter="url(#glow)"/>

    <!-- C Shape -->
    <path d="M 90 30 Q 90 10 70 10 Q 50 10 50 30 L 50 70 Q 50 90 70 90 Q 90 90 90 70"
          stroke="#FFFFFF"
          stroke-width="18"
          stroke-linecap="round"
          fill="none"
          filter="url(#glow)"/>

    <!-- Center Dot with glow -->
    <circle cx="50" cy="50" r="20" fill="#FFB84D" opacity="0.2"/>
    <circle cx="50" cy="50" r="14" fill="#FFB84D" opacity="0.4"/>
    <circle cx="50" cy="50" r="8" fill="#FFB84D" filter="url(#gold-glow)"/>
  </g>

  <!-- Content Area -->
  <g transform="translate(400, 200)">
    <!-- Main Heading -->
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700" fill="#FFFFFF">
      Lucent
    </text>

    <!-- Tagline -->
    <text x="0" y="65" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="500" fill="#FFB84D">
      See clearly before you sign
    </text>

    <!-- Description -->
    <text x="0" y="120" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400" fill="#FFFFFF" opacity="0.8">
      Transaction preview &amp; security for Stacks
    </text>

    <!-- Feature Highlights -->
    <g transform="translate(0, 170)">
      <!-- Feature 1 -->
      <circle cx="8" cy="-5" r="6" fill="#4A9EFF"/>
      <text x="25" y="0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#FFFFFF" opacity="0.7">
        Real-time transaction preview
      </text>

      <!-- Feature 2 -->
      <circle cx="8" cy="30" r="6" fill="#4A9EFF"/>
      <text x="25" y="35" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#FFFFFF" opacity="0.7">
        Security alerts &amp; warnings
      </text>

      <!-- Feature 3 -->
      <circle cx="8" cy="65" r="6" fill="#4A9EFF"/>
      <text x="25" y="70" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#FFFFFF" opacity="0.7">
        Multi-wallet support
      </text>
    </g>
  </g>

  <!-- Bottom Accent -->
  <rect x="400" y="580" width="120" height="4" fill="#FFB84D" opacity="0.6" rx="2"/>
</svg>
