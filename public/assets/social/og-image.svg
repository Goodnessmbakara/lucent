<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Open Graph Image: 1200x630px -->

  <defs>
    <!-- Gradient Background -->
    <linearGradient id="og-bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#151A35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1F3A;stop-opacity:1" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="og-grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(74, 158, 255, 0.08)" stroke-width="1"/>
    </pattern>

    <!-- Glow Effects -->
    <filter id="og-glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="og-gold-glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#og-bg-gradient)"/>

  <!-- Grid Overlay -->
  <rect width="1200" height="630" fill="url(#og-grid)"/>

  <!-- Decorative Background Elements -->
  <circle cx="150" cy="100" r="100" fill="#FFB84D" opacity="0.04"/>
  <circle cx="1050" cy="530" r="120" fill="#4A9EFF" opacity="0.04"/>
  <circle cx="950" cy="120" r="80" fill="#4A9EFF" opacity="0.03"/>

  <!-- Content Container -->
  <g transform="translate(100, 130)">
    <!-- Lucent Logo (Larger, More Prominent) -->
    <g transform="translate(100, 50) scale(1.3)">
      <!-- L Shape -->
      <path d="M 10 10 L 10 90 L 60 90"
            stroke="#FFFFFF"
            stroke-width="18"
            stroke-linecap="round"
            stroke-linejoin="round"
            fill="none"
            filter="url(#og-glow)"/>

      <!-- C Shape -->
      <path d="M 90 30 Q 90 10 70 10 Q 50 10 50 30 L 50 70 Q 50 90 70 90 Q 90 90 90 70"
            stroke="#FFFFFF"
            stroke-width="18"
            stroke-linecap="round"
            fill="none"
            filter="url(#og-glow)"/>

      <!-- Center Dot with enhanced glow -->
      <circle cx="50" cy="50" r="22" fill="#FFB84D" opacity="0.2"/>
      <circle cx="50" cy="50" r="16" fill="#FFB84D" opacity="0.4"/>
      <circle cx="50" cy="50" r="10" fill="#FFB84D" filter="url(#og-gold-glow)"/>
    </g>

    <!-- Main Content -->
    <g transform="translate(350, 80)">
      <!-- Brand Name -->
      <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="84" font-weight="700" fill="#FFFFFF" letter-spacing="1">
        Lucent
      </text>

      <!-- Tagline -->
      <text x="0" y="70" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="500" fill="#FFB84D">
        See clearly before you sign
      </text>

      <!-- Subtitle -->
      <text x="0" y="125" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="400" fill="#FFFFFF" opacity="0.85">
        Transaction preview &amp; security for Stacks
      </text>

      <!-- Trust Indicators -->
      <g transform="translate(0, 180)">
        <!-- Secure -->
        <g>
          <rect x="0" y="-25" width="150" height="45" rx="22.5" fill="rgba(74, 158, 255, 0.15)" stroke="#4A9EFF" stroke-width="1.5"/>
          <text x="20" y="5" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#FFFFFF">
            🔒 Secure
          </text>
        </g>

        <!-- Real-Time -->
        <g transform="translate(170, 0)">
          <rect x="0" y="-25" width="180" height="45" rx="22.5" fill="rgba(255, 184, 77, 0.15)" stroke="#FFB84D" stroke-width="1.5"/>
          <text x="20" y="5" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#FFFFFF">
            ⚡ Real-Time
          </text>
        </g>

        <!-- Protected -->
        <g transform="translate(370, 0)">
          <rect x="0" y="-25" width="170" height="45" rx="22.5" fill="rgba(74, 158, 255, 0.15)" stroke="#4A9EFF" stroke-width="1.5"/>
          <text x="20" y="5" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#FFFFFF">
            🛡️ Protected
          </text>
        </g>
      </g>
    </g>
  </g>

  <!-- Footer with URL -->
  <g transform="translate(100, 550)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#FFB84D" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
    <text x="100" y="8" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="500" fill="#FFFFFF" opacity="0.9">
      getlucent.com
    </text>
  </g>

  <!-- Decorative Corner Accent -->
  <g transform="translate(1050, 80)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#FFB84D" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
    <line x1="80" y1="0" x2="80" y2="80" stroke="#FFB84D" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
  </g>
</svg>
