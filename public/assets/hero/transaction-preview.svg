<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Transaction Preview Mockup: Before/After Comparison -->

  <!-- Background -->
  <defs>
    <linearGradient id="bg-gradient-tp" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F6F9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8EAF0;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="card-shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8F9FA;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.08"/>
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg-gradient-tp)"/>

  <!-- BEFORE Section (Top) -->
  <g id="before-section">
    <!-- Label -->
    <rect x="50" y="30" width="70" height="28" rx="14" fill="#FF5F56" opacity="0.15"/>
    <text x="85" y="49" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#FF5F56" text-anchor="middle">
      BEFORE
    </text>

    <!-- Raw Transaction Card -->
    <rect x="50" y="70" width="700" height="200" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="50" y="70" width="700" height="200" rx="12" fill="url(#card-shine)"/>

    <!-- Card Header -->
    <rect x="50" y="70" width="700" height="50" rx="12" fill="#0A0E27"/>
    <rect x="50" y="108" width="700" height="12" fill="#0A0E27"/>

    <text x="70" y="101" font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" fill="#FFFFFF">
      Transaction Request
    </text>

    <!-- Lucent Icon in corner -->
    <g transform="translate(710, 85)">
      <g transform="scale(0.15)">
        <path d="M 8 8 L 8 72 L 48 72"
              stroke="#FFB84D"
              stroke-width="14"
              stroke-linecap="round"
              stroke-linejoin="round"
              fill="none"/>
        <circle cx="40" cy="40" r="6" fill="#FFB84D" filter="url(#glow)"/>
      </g>
    </g>

    <!-- Raw Contract Call (Confusing) -->
    <rect x="70" y="135" width="660" height="115" rx="6" fill="#F8F9FA"/>
    <text x="85" y="158" font-family="JetBrains Mono, monospace" font-size="12" fill="#999">
      Contract Call:
    </text>

    <text x="85" y="182" font-family="JetBrains Mono, monospace" font-size="11" fill="#0A0E27">
      (contract-call? 'SP3K8BC0PPEVCV7NZ6QSRWPQ2JE9E5B6N3PA0KBR9.amm-swap-pool-v1-1
    </text>
    <text x="85" y="200" font-family="JetBrains Mono, monospace" font-size="11" fill="#0A0E27">
      swap-x-for-y 'SP3K8BC0PPEVCV7NZ6QSRWPQ2JE9E5B6N3PA0KBR9.token-wstx
    </text>
    <text x="85" y="218" font-family="JetBrains Mono, monospace" font-size="11" fill="#0A0E27">
      'SP3K8BC0PPEVCV7NZ6QSRWPQ2JE9E5B6N3PA0KBR9.token-alex u10000000
    </text>
    <text x="85" y="236" font-family="JetBrains Mono, monospace" font-size="11" fill="#0A0E27">
      u45000000 none)
    </text>

    <!-- Confusion Icon -->
    <circle cx="400" cy="285" r="16" fill="#FF5F56" opacity="0.15"/>
    <text x="400" y="293" font-family="Inter, sans-serif" font-size="20" fill="#FF5F56" text-anchor="middle">
      ?
    </text>
  </g>

  <!-- Arrow Indicator -->
  <g transform="translate(370, 305)">
    <circle cx="30" cy="30" r="30" fill="#FFB84D" filter="url(#shadow)"/>
    <path d="M 25 22 L 35 32 L 25 42" stroke="#0A0E27" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- AFTER Section (Bottom) -->
  <g id="after-section">
    <!-- Label -->
    <rect x="50" y="370" width="70" height="28" rx="14" fill="#27C93F" opacity="0.15"/>
    <text x="85" y="389" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#27C93F" text-anchor="middle">
      AFTER
    </text>

    <!-- Lucent Decoded Card -->
    <rect x="50" y="410" width="700" height="160" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>

    <!-- Status Badge -->
    <rect x="70" y="430" width="90" height="28" rx="14" fill="#27C93F" opacity="0.15"/>
    <circle cx="85" cy="444" r="5" fill="#27C93F"/>
    <text x="120" y="449" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#27C93F" text-anchor="middle">
      ✓ Safe
    </text>

    <!-- Security Score -->
    <text x="720" y="449" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#27C93F" text-anchor="end">
      95/100
    </text>

    <!-- Clear Action Description -->
    <text x="70" y="480" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#0A0E27">
      Swap 10 STX for 45.23 ALEX
    </text>

    <!-- Transaction Details -->
    <g transform="translate(70, 495)">
      <!-- From Token -->
      <rect x="0" y="0" width="310" height="50" rx="8" fill="#F8F9FA"/>
      <text x="15" y="22" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#0A0E27">
        10 STX
      </text>
      <text x="15" y="39" font-family="Inter, sans-serif" font-size="11" fill="#999">
        ≈ $15.50 USD
      </text>

      <!-- Arrow -->
      <text x="325" y="27" font-family="Inter, sans-serif" font-size="24" fill="#FFB84D" text-anchor="middle">
        →
      </text>

      <!-- To Token -->
      <rect x="350" y="0" width="310" height="50" rx="8" fill="#F8F9FA"/>
      <text x="365" y="22" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#0A0E27">
        45.23 ALEX
      </text>
      <text x="365" y="39" font-family="Inter, sans-serif" font-size="11" fill="#999">
        ≈ $15.42 USD
      </text>
    </g>
  </g>

  <!-- Bottom Info -->
  <g transform="translate(50, 580)">
    <text font-family="Inter, sans-serif" font-size="11" fill="#666">
      ✓ Contract verified
    </text>
    <text x="150" font-family="Inter, sans-serif" font-size="11" fill="#666">
      ✓ No unlimited approvals
    </text>
    <text x="330" font-family="Inter, sans-serif" font-size="11" fill="#666">
      ✓ 10,234 successful transactions
    </text>
  </g>
</svg>
